services:
  # 1. MinIO - Hồ chứa dữ liệu
  minio:
    image: minio/minio:latest
    container_name: ecommerce-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"

  # 2. Spark Master
  spark-master:
    image: apache/spark:3.5.1 # Đổi sang Apache Spark chính chủ
    container_name: ecommerce-spark-master
    environment:
      - SPARK_MODE=master
    volumes:
      - ./scripts:/opt/spark/scripts
    ports:
      - "8081:8081" # Web UI của Master
      - "7077:7077" # Cổng kết nối
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master

  # 3. Spark Worker
  spark-worker:
    image: apache/spark:3.5.1
    container_name: ecommerce-spark-worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
    volumes:
      - ./scripts:/opt/spark/scripts
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077

  # 4. Airflow
  airflow:
    image: apache/airflow:2.7.1
    container_name: ecommerce-airflow
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8082:8080"
    command: standalone

  zookeeper:
    image: zookeeper:3.9
    container_name: ecommerce-zookeeper
    ports:
      - "2181:2181"

  kafka:
    image: wurstmeister/kafka:2.13-2.8.1
    container_name: ecommerce-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092
      - KAFKA_CREATE_TOPICS="orders:1:1"
    depends_on:
      - zookeeper